# Agent Identity Verification - NAT Workflow Configuration
# Copy to identity-agent.yml and customize

functions:
  verify_agent_identity:
    _type: verify_agent_identity
    registry_url: "http://localhost:8500"
    min_reputation_score: 50.0
    required_capabilities: []
    chain: "base"
    request_timeout: 15.0

  lookup_agent_reputation:
    _type: lookup_agent_reputation
    registry_url: "http://localhost:8500"
    chain: "base"
    request_timeout: 15.0

llms:
  nim_llm:
    _type: nim
    model_name: "meta/llama-3.3-70b-instruct"
    temperature: 0.1
    max_tokens: 2048

workflow:
  _type: react_agent
  tool_names:
    - verify_agent_identity
    - lookup_agent_reputation
  llm_name: nim_llm
  verbose: true
  max_iterations: 5
  retry_parsing_errors: true
