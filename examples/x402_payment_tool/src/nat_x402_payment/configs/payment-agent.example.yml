# x402 Payment Tool — NeMo Agent Toolkit Workflow Configuration
# Copy to payment-agent.yml and update settings for your deployment.
#
# Run with: nat run --config_file payment-agent.yml
#
# For testing with the mock x402 server:
#   1. Start the mock: python scripts/mock_x402_server.py
#   2. Set WALLET_PRIVATE_KEY to any hex string (mock doesn't validate signatures)
#   3. Run: nat run --config_file payment-agent.yml

functions:
  fetch_paid_api:
    _type: fetch_paid_api
    max_per_transaction: 0.10        # Max USDC per single payment
    max_daily_spend: 5.00            # Daily spending cap in USDC
    allowed_recipients: []           # Allowlisted addresses (empty = allow all)
    wallet_signer_url: ""            # Remote signer URL (empty = use WALLET_PRIVATE_KEY env var)
    request_timeout: 30.0            # HTTP timeout in seconds

  get_payment_status:
    _type: get_payment_status

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.3-70b-instruct
    temperature: 0.1
    max_tokens: 1024

workflow:
  _type: react_agent
  tool_names:
    - fetch_paid_api
    - get_payment_status
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3
